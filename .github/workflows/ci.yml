name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: system_tandas_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d system_tandas_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/system_tandas_ci
      REDIS_URL: redis://127.0.0.1:6379
      CACHE_TTL_SECONDS: 30
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
      REQUEST_BODY_LIMIT: 10kb
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 300
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_LOGIN_RATE_LIMIT_MAX: 20
      AUTH_REFRESH_RATE_LIMIT_MAX: 20
      COOKIE_SAME_SITE: lax
      JWT_ACCESS_SECRET: test-access-secret-that-is-at-least-thirty-two-chars
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_SECRET: test-refresh-secret-that-is-at-least-thirty-two-chars
      JWT_REFRESH_TTL_SECONDS: 2592000
      RUN_INTEGRATION_TESTS: "true"
      REDIS_INTEGRATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter system-tandas-backend prisma generate

      - name: Prisma migrate deploy
        run: pnpm --filter system-tandas-backend prisma migrate deploy

      - name: Backend typecheck
        run: pnpm --filter system-tandas-backend typecheck

      - name: Backend tests
        run: pnpm --filter system-tandas-backend test

      - name: Backend build
        run: pnpm --filter system-tandas-backend build

      - name: Web typecheck
        run: pnpm --filter system-tandas-web typecheck

      - name: Web tests
        run: pnpm --filter system-tandas-web test:run

      - name: Web build
        run: pnpm --filter system-tandas-web build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker build backend
        run: docker build -f backend/Dockerfile -t system-tandas-backend:ci .

      - name: Docker runtime smoke test backend and worker
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            docker rm -f system-tandas-backend-smoke system-tandas-worker-smoke >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker run --rm \
            --network host \
            --entrypoint node_modules/.bin/prisma \
            --env DATABASE_URL \
            system-tandas-backend:ci \
            migrate status

          docker run -d \
            --name system-tandas-backend-smoke \
            --network host \
            --env NODE_ENV \
            --env PORT=3000 \
            --env DATABASE_URL \
            --env REDIS_URL \
            --env CACHE_TTL_SECONDS \
            --env FRONTEND_URL \
            --env CORS_ORIGINS \
            --env REQUEST_BODY_LIMIT \
            --env RATE_LIMIT_WINDOW_MS \
            --env RATE_LIMIT_MAX \
            --env AUTH_RATE_LIMIT_WINDOW_MS \
            --env AUTH_LOGIN_RATE_LIMIT_MAX \
            --env AUTH_REFRESH_RATE_LIMIT_MAX \
            --env COOKIE_SAME_SITE \
            --env JWT_ACCESS_SECRET \
            --env JWT_ACCESS_TTL_SECONDS \
            --env JWT_REFRESH_SECRET \
            --env JWT_REFRESH_TTL_SECONDS \
            system-tandas-backend:ci

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3000/health/ready; then
              break
            fi

            if [ "$attempt" -eq 20 ]; then
              docker logs system-tandas-backend-smoke
              exit 1
            fi

            sleep 1
          done

          docker run -d \
            --name system-tandas-worker-smoke \
            --network host \
            --entrypoint node \
            --env NODE_ENV \
            --env DATABASE_URL \
            --env REDIS_URL \
            --env CACHE_TTL_SECONDS \
            --env FRONTEND_URL \
            --env CORS_ORIGINS \
            --env REQUEST_BODY_LIMIT \
            --env RATE_LIMIT_WINDOW_MS \
            --env RATE_LIMIT_MAX \
            --env AUTH_RATE_LIMIT_WINDOW_MS \
            --env AUTH_LOGIN_RATE_LIMIT_MAX \
            --env AUTH_REFRESH_RATE_LIMIT_MAX \
            --env COOKIE_SAME_SITE \
            --env JWT_ACCESS_SECRET \
            --env JWT_ACCESS_TTL_SECONDS \
            --env JWT_REFRESH_SECRET \
            --env JWT_REFRESH_TTL_SECONDS \
            system-tandas-backend:ci \
            dist/src/workers/tanda-build.worker.js

          sleep 5
          test "$(docker inspect --format='{{.State.Running}}' system-tandas-worker-smoke)" = "true"

      - name: Docker build web
        run: docker build -f web/Dockerfile -t system-tandas-web:ci .
